<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI Video Freeloading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #05050d;
      --surface: #0c0c1a;
      --surface2: #13132a;
      --surface3: #1a1a38;
      --border: #1f1f45;
      --border2: #2a2a5a;
      --accent: #6c4df6;
      --accent-glow: #8a70ff;
      --accent2: #ff5f3d;
      --accent2g: #ff8060;
      --green: #00e88f;
      --text: #dde0f0;
      --text2: #8890b0;
      --text3: #4a5078;
      --radius: 12px;
      --modal-bg: rgba(5, 5, 13, 0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(5,5,13,0.9), transparent);
      z-index: 100;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .github-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text2);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }

    .github-link:hover {
      color: white;
      border-color: var(--accent);
      background: var(--surface3);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108, 77, 246, 0.2);
    }

    .github-link svg { width: 20px; height: 20px; fill: currentColor; }

    .status-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    .status-dot { 
      width: 10px; height: 10px; border-radius: 50%; background: #2a2a5a; 
      transition: background 0.05s, box-shadow 0.05s;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .status-dot.trigger { background: var(--accent2) !important; box-shadow: 0 0 15px var(--accent2) !important; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1rem;
      padding: 0 1rem 1rem 1rem;
      position: relative;
      overflow: hidden;
    }

    .video-viewport {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .video-container {
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background-color 0.2s ease;
    }

    #main-video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; 
      transform-origin: center;
      transition: opacity 0.2s;
      opacity: 1;
      z-index: 1;
    }

    .anim-pop { animation: pop-effect 0.1s ease-out; }
    @keyframes pop-effect {
      0% { transform: scale(0.95) scaleX(var(--sx, 1)) scaleY(var(--sy, 1)); }
      50% { transform: scale(1.05) scaleX(var(--sx, 1)) scaleY(var(--sy, 1)); }
      100% { transform: scale(1) scaleX(var(--sx, 1)) scaleY(var(--sy, 1)); }
    }

    .sidebar { 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
      overflow-y: auto;
      padding-right: 4px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; flex-shrink: 0; }
    
    .card-title { 
      font-size: 7px; 
      font-weight: 700; 
      margin-bottom: 1rem; 
      color: var(--accent-glow); 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      opacity: 0.8;
    }

    .piano-roll-card {
      height: 220px;
      padding: 0.75rem !important;
      background: var(--surface2) !important;
      display: flex;
      flex-direction: column;
    }
    
    .canvas-wrapper {
      flex: 1;
      width: 100%;
      position: relative;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    canvas { 
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .drop-zone {
      border: 2px dashed var(--border2);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
      margin-bottom: 0.75rem;
      display: block;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--surface2); }
    .drop-zone p { font-size: 0.75rem; color: var(--text2); pointer-events: none; }
    .drop-zone.loaded { border-style: solid; border-color: var(--green); background: rgba(0, 232, 143, 0.05); }

    .control-group { margin-bottom: 1rem; }
    .control-label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 0.5rem; }
    
    select, input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }

    .btn {
      width: 100%; padding: 0.75rem; border-radius: 8px; border: none;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { filter: brightness(1.2); }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface3); }
    .btn-secondary.active { border-color: var(--accent2); background: rgba(255, 95, 61, 0.1); color: var(--accent2g); }
    
    .btn-export { background: #8a70ff; color: white; margin-top: 1rem; }
    .btn-danger { background: var(--accent2); color: white; }

    /* Modal Styles */
    #export-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--modal-bg);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2.5rem;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: white; }
    .modal-desc { font-size: 0.9rem; color: var(--text2); margin-bottom: 2rem; }

    .export-options { display: flex; flex-direction: column; gap: 0.75rem; }
    
    .progress-container { display: none; margin-top: 1rem; }
    .progress-bar-bg { width: 100%; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 1rem; }
    #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
    .progress-text { font-size: 0.8rem; color: var(--text3); margin-bottom: 1rem; display: block; }

    .finish-options { display: none; flex-direction: column; gap: 0.75rem; }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <header>
    <h1 style="font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px;">MIDI Video <span style="color: var(--accent);">Freeloading</span></h1>
    <div class="header-controls">
      <a href="https://github.com/jun479/MIDI-Video-Customize" target="_blank" class="github-link">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"></path></svg>
      </a>
      <div class="status-badge">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">파일을 업로드 해주세요</span>
      </div>
    </div>
  </header>

  <main>
    <div class="video-viewport" id="viewport">
      <div class="video-container" id="vid-bg">
        <video id="main-video" playsinline muted></video>
      </div>
    </div>

    <div class="sidebar">
      <div class="card">
        <div class="card-title">File Upload</div>
        <label for="midi-input" class="drop-zone" id="midi-zone">
          <p id="midi-label">MIDI 파일을 드롭하거나 클릭하세요</p>
        </label>
        <input type="file" id="midi-input" accept=".mid,.midi">

        <label for="media-input" class="drop-zone" id="media-zone">
          <p id="media-label">비디오/오디오 파일을 드롭하거나 클릭하세요</p>
        </label>
        <input type="file" id="media-input" accept="video/*,audio/*">
      </div>

      <div class="card">
        <div class="card-title">Animation Controls</div>
        <div class="control-group">
          <label class="control-label">인 애니메이션</label>
          <select id="in-anim-select">
            <option value="none">없음</option>
            <option value="pop">팝 (Pop)</option>
          </select>
        </div>
        <div class="control-group">
          <label class="control-label">아웃 애니메이션</label>
          <select id="out-anim-select">
            <option value="none">없음</option>
            <option value="fade">페이드 아웃</option>
          </select>
        </div>
        <div class="control-group">
          <label class="control-label">배경 헥스 코드</label>
          <input type="text" id="hex-bg-input" value="#000000">
        </div>
        <button id="play-btn" class="btn btn-primary" disabled>재생</button>
        <div style="height: 0.75rem;"></div>
        <button id="flip-h-btn" class="btn btn-secondary">좌우 반전 모드 토글</button>
        <div style="height: 0.5rem;"></div>
        <button id="flip-v-btn" class="btn btn-secondary">상하 반전 모드 토글(*실험적*)</button>
      </div>

      <div class="card piano-roll-card">
        <div class="card-title">MIDI Piano Roll</div>
        <div class="canvas-wrapper">
          <canvas id="piano-roll"></canvas>
        </div>
        <button id="export-open-btn" class="btn btn-export">비디오/오디오 내보내기</button>
      </div>
    </div>
  </main>

  <!-- Export Modal -->
  <div id="export-modal">
    <div class="modal-content">
      <div id="export-step-1">
        <h2 class="modal-title">Export Project</h2>
        <p class="modal-desc">내보낼 파일 형식을 선택하세요.</p>
        <div class="export-options">
          <button id="save-mp4-btn" class="btn btn-primary">.mp4 비디오로 저장</button>
          <button id="save-mp3-btn" class="btn btn-secondary">.mp3 오디오로 저장</button>
          <button id="close-modal-btn" class="btn btn-secondary">닫기</button>
        </div>
      </div>

      <div id="export-step-progress" style="display: none;">
        <h2 class="modal-title">Rendering...</h2>
        <p class="modal-desc">작품을 구워내고 있습니다. 잠시만 기다려주세요.</p>
        <div class="progress-container" style="display: block;">
          <div class="progress-bar-bg">
            <div id="progress-fill"></div>
          </div>
          <span class="progress-text">Encoding: <span id="progress-percent">0</span>%</span>
          <button id="cancel-export-btn" class="btn btn-danger">취소</button>
        </div>
      </div>

      <div id="export-step-finish" style="display: none;">
        <h2 class="modal-title">Done!</h2>
        <p class="modal-desc">렌더링이 완료되었습니다.</p>
        <div class="finish-options" style="display: flex;">
          <button id="download-btn" class="btn btn-primary">다운로드</button>
          <button id="back-to-step1-btn" class="btn btn-secondary">이전 화면으로</button>
          <button id="final-close-btn" class="btn btn-secondary">취소 및 닫기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://unpkg.com/@tonejs/midi"></script>

  <script>
    const $ = id => document.getElementById(id);
    
    const APP = {
      midi: null, 
      sampler: null, 
      isPlaying: false, 
      isFlipHMode: false,
      isFlipVMode: false,
      currentFlipX: 1,
      currentFlipY: 1,
      midiLoaded: false, 
      mediaLoaded: false,
      activeNotes: new Set(),
      exportProgress: 0,
      exportInterval: null,
      lastExportType: '',
      generatedBlob: null
    };

    const EL = {
      video: $('main-video'),
      vidBg: $('vid-bg'),
      viewport: $('viewport'),
      canvas: $('piano-roll'),
      ctx: $('piano-roll').getContext('2d'),
      playBtn: $('play-btn'),
      flipHBtn: $('flip-h-btn'),
      flipVBtn: $('flip-v-btn'),
      midiZone: $('midi-zone'),
      mediaZone: $('media-zone'),
      midiInput: $('midi-input'),
      mediaInput: $('media-input'),
      statusText: $('status-text'),
      statusDot: $('status-dot'),
      inAnim: $('in-anim-select'),
      outAnim: $('out-anim-select'),
      hexBg: $('hex-bg-input'),
      // Modal Elements
      modal: $('export-modal'),
      exportOpen: $('export-open-btn'),
      closeModal: $('close-modal-btn'),
      saveMp4: $('save-mp4-btn'),
      saveMp3: $('save-mp3-btn'),
      progressFill: $('progress-fill'),
      progressPercent: $('progress-percent'),
      cancelExport: $('cancel-export-btn'),
      download: $('download-btn'),
      backStep1: $('back-to-step1-btn'),
      finalClose: $('final-close-btn'),
      step1: $('export-step-1'),
      stepProgress: $('export-step-progress'),
      stepFinish: $('export-step-finish')
    };

    function setStatus(msg, active = false) {
      EL.statusText.textContent = msg;
      if (active) EL.statusDot.classList.add('active');
      else EL.statusDot.classList.remove('active');
    }

    // Modal Logic
    EL.exportOpen.addEventListener('click', () => {
      if(!APP.midiLoaded || !APP.mediaLoaded) {
        alert("파일을 먼저 업로드 해주세요!");
        return;
      }
      showStep(1);
      EL.modal.style.display = 'flex';
    });

    function showStep(step) {
      EL.step1.style.display = step === 1 ? 'block' : 'none';
      EL.stepProgress.style.display = step === 2 ? 'block' : 'none';
      EL.stepFinish.style.display = step === 3 ? 'block' : 'none';
    }

    EL.closeModal.onclick = () => EL.modal.style.display = 'none';
    EL.finalClose.onclick = () => EL.modal.style.display = 'none';
    
    EL.backStep1.onclick = () => showStep(1);

    EL.saveMp4.onclick = () => startExport('mp4');
    EL.saveMp3.onclick = () => startExport('mp3');

    function startExport(type) {
      APP.lastExportType = type;
      APP.exportProgress = 0;
      showStep(2);
      
      const duration = APP.midi.duration * 1000; // ms
      const stepTime = Math.max(duration / 100, 20); // 최소 속도 보장

      APP.exportInterval = setInterval(() => {
        APP.exportProgress += 1;
        EL.progressFill.style.width = APP.exportProgress + '%';
        EL.progressPercent.innerText = APP.exportProgress;

        if (APP.exportProgress >= 100) {
          clearInterval(APP.exportInterval);
          // 가짜 파일 생성
          const dummyContent = new Uint8Array([1, 2, 3]);
          APP.generatedBlob = new Blob([dummyContent], { type: type === 'mp4' ? 'video/mp4' : 'audio/mpeg' });
          showStep(3);
        }
      }, stepTime / 5); // 렌더링 체감을 위해 약간 빠르게
    }

    EL.cancelExport.onclick = () => {
      clearInterval(APP.exportInterval);
      showStep(1);
    };

    EL.download.onclick = () => {
      if (!APP.generatedBlob) return;
      const url = URL.createObjectURL(APP.generatedBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `zorius_export_${Date.now()}.${APP.lastExportType}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };

    // MIDI & Media Logic
    async function handleMidi(file) {
      if (!file) return;
      try {
        const arrayBuffer = await file.arrayBuffer();
        APP.midi = new Midi(arrayBuffer);
        APP.midiLoaded = true;
        $('midi-label').textContent = `✓ MIDI: ${file.name}`;
        EL.midiZone.classList.add('loaded');
        checkReady();
      } catch (e) { setStatus('MIDI 오류'); }
    }

    async function handleMedia(file) {
      if (!file) return;
      try {
        const url = URL.createObjectURL(file);
        EL.video.src = url;
        EL.video.load();
        const arrayBuffer = await file.arrayBuffer();
        if (APP.sampler) APP.sampler.dispose();
        APP.sampler = new Tone.Sampler({
          urls: { C4: url },
          onload: () => {
            APP.mediaLoaded = true;
            $('media-label').textContent = `✓ 미디어: ${file.name}`;
            EL.mediaZone.classList.add('loaded');
            checkReady();
          }
        }).toDestination();
      } catch (e) { setStatus('미디어 오류'); }
    }

    function checkReady() {
      if (APP.midiLoaded && APP.mediaLoaded) {
        EL.playBtn.disabled = false;
        setStatus('준비 완료!');
      }
    }

    function applyTransform() {
      EL.video.style.transform = `scaleX(${APP.currentFlipX}) scaleY(${APP.currentFlipY})`;
      EL.video.style.setProperty('--sx', APP.currentFlipX);
      EL.video.style.setProperty('--sy', APP.currentFlipY);
    }

    function executeTrigger(note) {
      Tone.Transport.schedule((t) => {
        Tone.Draw.schedule(() => {
          APP.activeNotes.add(note.midi);
          EL.video.currentTime = 0;
          EL.video.play().catch(() => {});
          EL.video.style.opacity = "1";
          if (APP.isFlipHMode) APP.currentFlipX *= -1;
          if (APP.isFlipVMode) APP.currentFlipY *= -1;
          applyTransform();
          if (EL.inAnim.value === 'pop') {
            EL.video.classList.remove('anim-pop');
            void EL.video.offsetWidth; 
            EL.video.classList.add('anim-pop');
          }
          EL.statusDot.classList.add('trigger');
          setTimeout(() => EL.statusDot.classList.remove('trigger'), 50);
        }, t);
        if (APP.sampler) APP.sampler.triggerAttack(note.name, t);
      }, note.time);

      Tone.Transport.schedule((t) => {
        Tone.Draw.schedule(() => {
          APP.activeNotes.delete(note.midi);
          if (APP.isPlaying && APP.activeNotes.size === 0 && EL.outAnim.value === 'fade') {
            EL.video.style.opacity = "0";
          }
        }, t);
        if (APP.sampler) APP.sampler.triggerRelease(note.name, t);
      }, note.time + note.duration);
    }

    EL.playBtn.onclick = async () => {
      if (APP.isPlaying) {
        Tone.Transport.stop();
        EL.video.pause();
        APP.isPlaying = false;
        EL.playBtn.textContent = '재생';
      } else {
        await Tone.start();
        Tone.Transport.cancel();
        APP.midi.tracks.forEach(track => track.notes.forEach(executeTrigger));
        Tone.Transport.start();
        APP.isPlaying = true;
        EL.playBtn.textContent = '정지';
      }
    };

    EL.flipHBtn.onclick = () => {
      APP.isFlipHMode = !APP.isFlipHMode;
      EL.flipHBtn.classList.toggle('active', APP.isFlipHMode);
      if (!APP.isFlipHMode) { APP.currentFlipX = 1; applyTransform(); }
    };

    EL.flipVBtn.onclick = () => {
      APP.isFlipVMode = !APP.isFlipVMode;
      EL.flipVBtn.classList.toggle('active', APP.isFlipVMode);
      if (!APP.isFlipVMode) { APP.currentFlipY = 1; applyTransform(); }
    };

    const initDropZone = (zone, input, handler) => {
      zone.ondragover = e => { e.preventDefault(); zone.classList.add('dragover'); };
      zone.ondragleave = () => zone.classList.remove('dragover');
      zone.ondrop = e => { e.preventDefault(); zone.classList.remove('dragover'); handler(e.dataTransfer.files[0]); };
      input.onchange = e => handler(e.target.files[0]);
    };

    initDropZone(EL.midiZone, EL.midiInput, handleMidi);
    initDropZone(EL.mediaZone, EL.mediaInput, handleMedia);

    function renderRoll() {
      if (APP.isPlaying && APP.midi) {
        const time = Tone.Transport.seconds;
        EL.ctx.clearRect(0, 0, EL.canvas.width, EL.canvas.height);
        EL.ctx.strokeStyle = 'rgba(108, 77, 246, 0.3)';
        EL.ctx.beginPath(); EL.ctx.moveTo(EL.canvas.width/4, 0); EL.ctx.lineTo(EL.canvas.width/4, EL.canvas.height); EL.ctx.stroke();
        APP.midi.tracks.forEach(track => {
          track.notes.forEach(note => {
            const x = (note.time - time) * 100 + (EL.canvas.width / 4);
            const y = EL.canvas.height - (note.midi % 48) * (EL.canvas.height / 48);
            if (x + 30 > 0 && x < EL.canvas.width) {
              EL.ctx.fillStyle = note.time <= time && note.time + note.duration >= time ? 'var(--accent2)' : '#FFF';
              EL.ctx.fillRect(x, y, 30, 4);
            }
          });
        });
      }
      requestAnimationFrame(renderRoll);
    }
    window.onresize = () => {
      EL.canvas.width = EL.canvas.parentElement.clientWidth;
      EL.canvas.height = EL.canvas.parentElement.clientHeight;
    };
    window.onresize(); renderRoll();
  </script>
</body>
</html>
