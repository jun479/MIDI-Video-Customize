<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI Video Freeloading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #05050d;
      --surface: #0c0c1a;
      --surface2: #13132a;
      --surface3: #1a1a38;
      --border: #1f1f45;
      --border2: #2a2a5a;
      --accent: #6c4df6;
      --accent-glow: #8a70ff;
      --accent2: #ff5f3d;
      --accent2g: #ff8060;
      --green: #00e88f;
      --text: #dde0f0;
      --text2: #8890b0;
      --text3: #4a5078;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(5, 5, 13, 0.9);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      height: 64px;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
      overflow: hidden;
    }

    .main-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    /* --- 공지사항 섹션 --- */
    .notice-section {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text2);
      white-space: nowrap;
    }

    .notice-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 자세히 보기 버튼 스타일 */
    .notice-btn {
      font-size: 0.7rem;
      color: var(--accent-glow);
      cursor: pointer;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .notice-btn:hover {
      background: var(--surface3);
      border-color: var(--accent);
      color: white;
    }

    @media (max-width: 768px) {
      .notice-text { display: none; }
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .github-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text2);
      transition: all 0.2s;
      text-decoration: none;
    }

    .github-link:hover { color: white; border-color: var(--accent); transform: translateY(-2px); }
    .github-link svg { width: 20px; height: 20px; fill: currentColor; }

    .status-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2a2a5a; }
    .status-dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .status-dot.trigger { background: var(--accent2) !important; box-shadow: 0 0 15px var(--accent2) !important; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1rem;
      padding: 1rem;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        overflow-y: auto;
      }
      .sidebar {
        overflow-y: visible !important;
      }
    }

    .video-viewport {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      min-height: 300px;
    }

    .video-container {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #main-video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; 
      opacity: 1;
    }

    .anim-pop { animation: pop-effect 0.1s ease-out; }
    @keyframes pop-effect {
      0% { transform: scale(0.95) scaleX(var(--sx, 1)) scaleY(var(--sy, 1)); }
      50% { transform: scale(1.05) scaleX(var(--sx, 1)) scaleY(var(--sy, 1)); }
      100% { transform: scale(1) scaleX(var(--sx, 1)) scaleY(var(--sy, 1)); }
    }

    /* 사이드바 스크롤 기능 복구 및 최적화 */
    .sidebar { 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
      overflow-y: auto; 
      padding-right: 8px;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }

    .card { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      padding: 1.25rem;
      flex-shrink: 0; /* 카드가 쪼그라들지 않도록 설정 */
    }
    .card-title { font-size: 0.65rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent-glow); text-transform: uppercase; letter-spacing: 1.5px; }

    /* 피아노 롤 카드 크기 고정 및 확대 */
    .piano-roll-card { 
      height: 320px; 
      min-height: 320px; 
      padding: 0.75rem; 
      background: var(--surface2); 
      display: flex; 
      flex-direction: column; 
    }
    .canvas-wrapper { flex: 1; width: 100%; position: relative; background: #000; border-radius: 6px; overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .drop-zone { border: 2px dashed var(--border2); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; margin-bottom: 0.75rem; display: block; }
    .drop-zone p { font-size: 0.7rem; color: var(--text2); }
    .drop-zone.loaded { border-style: solid; border-color: var(--green); background: rgba(0, 232, 143, 0.05); }

    .control-group { margin-bottom: 0.8rem; }
    .control-label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 0.4rem; }
    
    select, input[type="text"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; color: var(--text); font-size: 0.8rem; outline: none;
    }

    .btn { width: 100%; padding: 0.7rem; border-radius: 8px; border: none; font-family: inherit; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.85rem; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary.active { border-color: var(--accent2); background: rgba(255, 95, 61, 0.1); color: var(--accent2g); }
    .btn-export { background: #8a70ff; color: white; margin-top: 0.75rem; }

    .progress-bg { width: 100%; height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; display: none; margin-bottom: 8px; }
    #export-progress { width: 0%; height: 100%; background: var(--green); }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="title-group">
      <h1 class="main-title">MIDI Video <span style="color: var(--accent);">Freeloading</span></h1>
      
      <div class="notice-section">
        <span class="notice-text">출처 표기 불필요 · 원본 저작권 책임은 사용자에게 있음</span>
        <button class="notice-btn" id="notice-btn">자세히 보기</button>
      </div>
    </div>

    <div class="header-controls">
      <a href="https://github.com/jun479/MIDI-Video-Customize" target="_blank" class="github-link">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"></path></svg>
      </a>
      <div class="status-badge">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Ready</span>
      </div>
    </div>
  </header>

  <main>
    <div class="video-viewport" id="viewport">
      <div class="video-container" id="vid-bg">
        <video id="main-video" playsinline muted></video>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="card">
        <div class="card-title">File Upload</div>
        <label for="midi-input" class="drop-zone" id="midi-zone"><p id="midi-label">MIDI 드롭/클릭</p></label>
        <input type="file" id="midi-input" accept=".mid,.midi">
        <label for="media-input" class="drop-zone" id="media-zone"><p id="media-label">미디어 드롭/클릭</p></label>
        <input type="file" id="media-input" accept="video/*,audio/*">
      </div>

      <div class="card">
        <div class="card-title">Animation Controls</div>
        <div class="control-group"><label class="control-label">인 애니메이션</label><select id="in-anim-select"><option value="none">없음</option><option value="pop">팝 (Pop)</option></select></div>
        <div class="control-group"><label class="control-label">아웃 애니메이션</label><select id="out-anim-select"><option value="none">없음</option><option value="fade">페이드 아웃</option></select></div>
        <div class="control-group"><label class="control-label">배경 헥스 코드</label><input type="text" id="hex-bg-input" placeholder="#000000" value="#000000"></div>
        <button id="play-btn" class="btn btn-primary" disabled>재생</button>
        <div style="height: 0.5rem;"></div>
        <button id="flip-h-btn" class="btn btn-secondary">좌우 반전</button>
        <div style="height: 0.4rem;"></div>
        <button id="flip-v-btn" class="btn btn-secondary">상하 반전</button>
      </div>

      <div class="card piano-roll-card">
        <div class="card-title">MIDI Piano Roll</div>
        <div class="canvas-wrapper"><canvas id="piano-roll"></canvas></div>
        <div class="progress-bg" id="progress-bg"><div id="export-progress"></div></div>
        <button id="export-audio-btn" class="btn btn-export" disabled>WAV 추출</button>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://unpkg.com/@tonejs/midi"></script>

  <script>
    const $ = id => document.getElementById(id);
    const APP = { midi: null, sampler: null, isPlaying: false, currentFlipX: 1, currentFlipY: 1, isFlipHMode: false, isFlipVMode: false, midiLoaded: false, mediaLoaded: false, activeNotes: new Set(), currentMediaUrl: null };
    const EL = { video: $('main-video'), vidBg: $('vid-bg'), viewport: $('viewport'), canvas: $('piano-roll'), ctx: $('piano-roll').getContext('2d'), playBtn: $('play-btn'), flipHBtn: $('flip-h-btn'), flipVBtn: $('flip-v-btn'), midiZone: $('midi-zone'), mediaZone: $('media-zone'), midiInput: $('midi-input'), mediaInput: $('media-input'), statusText: $('status-text'), statusDot: $('status-dot'), inAnim: $('in-anim-select'), outAnim: $('out-anim-select'), hexBg: $('hex-bg-input'), exportBtn: $('export-audio-btn'), progressBg: $('progress-bg'), progressFill: $('export-progress'), noticeBtn: $('notice-btn') };

    // 자세히 보기 팝업 핸들러
    EL.noticeBtn.onclick = () => {
      const msg = "본 사이트를 통해 생성된 결과물은 자유롭게 사용 가능하며 출처 표기는 불필요합니다.\n\n" +
                  "단, 업로드한 파일의 저작권 및 사용 책임은 전적으로 사용자에게 있습니다.\n" +
                  "모든 처리는 브라우저에서 실시간으로 이루어지며, 파일은 서버로 전송되지 않습니다.";
      alert(msg);
    };

    function setStatus(msg, active = false) { EL.statusText.textContent = msg; if (active) EL.statusDot.classList.add('active'); else EL.statusDot.classList.remove('active'); }
    EL.hexBg.oninput = e => { if (/^#([0-9A-F]{3}){1,2}$/i.test(e.target.value)) EL.vidBg.style.backgroundColor = EL.viewport.style.backgroundColor = e.target.value; };

    async function handleMidi(f) { try { const b = await f.arrayBuffer(); APP.midi = new Midi(b); APP.midiLoaded = true; $('midi-label').textContent = `✓ MIDI: ${f.name.substring(0,8)}`; EL.midiZone.classList.add('loaded'); checkReady(); } catch(e){} }
    async function handleMedia(f) { try { if (APP.currentMediaUrl) URL.revokeObjectURL(APP.currentMediaUrl); APP.currentMediaUrl = URL.createObjectURL(f); EL.video.src = APP.currentMediaUrl; EL.video.load(); if (APP.sampler) APP.sampler.dispose(); APP.sampler = new Tone.Sampler({ urls: { C4: APP.currentMediaUrl }, onload: () => { APP.mediaLoaded = true; $('media-label').textContent = `✓ 미디어 로드됨`; EL.mediaZone.classList.add('loaded'); checkReady(); } }).toDestination(); } catch(e){} }
    function checkReady() { if (APP.midiLoaded && APP.mediaLoaded) { EL.playBtn.disabled = EL.exportBtn.disabled = false; setStatus('Ready', true); } }

    function executeTrigger(note) {
      Tone.Transport.schedule(t => {
        Tone.Draw.schedule(() => {
          APP.activeNotes.add(note.midi); EL.video.currentTime = 0; EL.video.play().catch(()=>{}); EL.video.style.opacity = "1";
          if (APP.isFlipHMode) APP.currentFlipX *= -1; if (APP.isFlipVMode) APP.currentFlipY *= -1;
          EL.video.style.transform = `scaleX(${APP.currentFlipX}) scaleY(${APP.currentFlipY})`;
          if (EL.inAnim.value === 'pop') { EL.video.classList.remove('anim-pop'); void EL.video.offsetWidth; EL.video.classList.add('anim-pop'); }
          EL.statusDot.classList.add('trigger'); setTimeout(() => EL.statusDot.classList.remove('trigger'), 50);
        }, t);
        if (APP.sampler) APP.sampler.triggerAttack(note.name, t);
      }, note.time);
      Tone.Transport.schedule(t => {
        Tone.Draw.schedule(() => { APP.activeNotes.delete(note.midi); if (APP.activeNotes.size === 0 && EL.outAnim.value === 'fade') EL.video.style.opacity = "0"; }, t);
        if (APP.sampler) APP.sampler.triggerRelease(note.name, t);
      }, note.time + note.duration);
    }

    EL.playBtn.onclick = async () => {
      if (APP.isPlaying) { Tone.Transport.stop(); EL.video.pause(); APP.isPlaying = false; EL.playBtn.textContent = '재생'; }
      else { await Tone.start(); Tone.Transport.cancel(); APP.midi.tracks.forEach(tr => tr.notes.forEach(executeTrigger)); Tone.Transport.start(); APP.isPlaying = true; EL.playBtn.textContent = '정지'; }
    };

    EL.flipHBtn.onclick = () => { APP.isFlipHMode = !APP.isFlipHMode; EL.flipHBtn.classList.toggle('active'); if(!APP.isFlipHMode) { APP.currentFlipX = 1; EL.video.style.transform = `scaleX(1) scaleY(${APP.currentFlipY})`; } };
    EL.flipVBtn.onclick = () => { APP.isFlipVMode = !APP.isFlipVMode; EL.flipVBtn.classList.toggle('active'); if(!APP.isFlipVMode) { APP.currentFlipY = 1; EL.video.style.transform = `scaleX(${APP.currentFlipX}) scaleY(1)`; } };

    const initDrop = (z, i, h) => { z.ondragover = e => { e.preventDefault(); z.classList.add('dragover'); }; z.ondragleave = () => z.classList.remove('dragover'); z.ondrop = e => { e.preventDefault(); h(e.dataTransfer.files[0]); }; i.onchange = e => h(e.target.files[0]); };
    initDrop(EL.midiZone, EL.midiInput, handleMidi); initDrop(EL.mediaZone, EL.mediaInput, handleMedia);

    function resizeCanvas() {
      const wrapper = EL.canvas.parentElement;
      EL.canvas.width = wrapper.clientWidth;
      EL.canvas.height = wrapper.clientHeight;
    }

    function render() {
      if (APP.isPlaying && APP.midi) {
        const time = Tone.Transport.seconds;
        EL.ctx.clearRect(0, 0, EL.canvas.width, EL.canvas.height);
        EL.ctx.fillStyle = '#FFFFFF';
        APP.midi.tracks.forEach(tr => tr.notes.forEach(n => {
          const x = (n.time - time) * 100 + (EL.canvas.width / 4);
          const y = EL.canvas.height - (n.midi % 48) * (EL.canvas.height / 48);
          if (x + 30 > 0 && x < EL.canvas.width) {
            if (n.time <= time && n.time + n.duration >= time) EL.ctx.fillStyle = 'var(--accent2)'; else EL.ctx.fillStyle = '#FFFFFF';
            EL.ctx.fillRect(x, y, 30, 4);
          }
        }));
      }
      requestAnimationFrame(render);
    }
    
    window.addEventListener('resize', resizeCanvas);
    window.onload = () => { 
      resizeCanvas();
      render(); 
    };
  </script>
</body>
</html>
