<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zorius MIDI 트리거 플레이어</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05050d;
      --surface: #0c0c1a;
      --surface2: #13132a;
      --surface3: #1a1a38;
      --border: #1f1f45;
      --border2: #2a2a5a;
      --accent: #6c4df6;
      --accent-glow: #8a70ff;
      --accent2: #ff5f3d;
      --accent2g: #ff8060;
      --green: #00e88f;
      --text: #dde0f0;
      --text2: #8890b0;
      --text3: #4a5078;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(5,5,13,0.9), transparent);
      z-index: 100;
    }

    .status-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    .status-dot { 
      width: 10px; height: 10px; border-radius: 50%; background: #2a2a5a; 
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .status-dot.trigger { background: var(--accent2) !important; box-shadow: 0 0 15px var(--accent2) !important; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1rem;
      padding: 0 1rem 1rem 1rem;
      position: relative;
    }

    .video-container {
      position: relative;
      background: black;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 애니메이션 제거: transition 없음 */
    #main-video {
      max-width: 100%;
      max-height: 100%;
      transform: scaleX(1);
    }

    .canvas-container {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      right: 340px;
      height: 120px;
      background: rgba(12, 12, 26, 0.6);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      pointer-events: none;
    }
    canvas { width: 100%; height: 100%; }

    .sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }

    .drop-zone {
      border: 2px dashed var(--border2);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--surface2); }
    .drop-zone p { font-size: 0.85rem; color: var(--text2); pointer-events: none; }
    .drop-zone.loaded { border-style: solid; border-color: var(--green); background: rgba(0, 232, 143, 0.05); }

    .btn {
      width: 100%; padding: 0.75rem; border-radius: 8px; border: none;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary.active { border-color: var(--accent2); background: rgba(255, 95, 61, 0.1); color: var(--accent2g); }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <header>
    <h1 style="font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px;">ZORIUS <span style="color: var(--accent);">TRIGGER PLAYER</span></h1>
    <div class="status-badge">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">파일을 업로드 해주세요</span>
    </div>
  </header>

  <main>
    <div class="video-container">
      <video id="main-video" playsinline muted></video>
      <div class="canvas-container">
        <canvas id="piano-roll"></canvas>
      </div>
    </div>

    <div class="sidebar">
      <div class="card">
        <div class="drop-zone" id="midi-zone">
          <p id="midi-label">MIDI 파일을 드롭하세요</p>
          <input type="file" id="midi-input" accept=".mid,.midi">
        </div>

        <div class="drop-zone" id="media-zone">
          <p id="media-label">MP3 또는 MP4 파일을 드롭하세요</p>
          <input type="file" id="media-input" accept="video/*,audio/*">
        </div>
      </div>

      <div class="card">
        <button id="play-btn" class="btn btn-primary" disabled>재생 버튼</button>
        <div style="height: 0.75rem;"></div>
        <button id="flip-btn" class="btn btn-secondary">좌우 반전 모드 토글</button>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://unpkg.com/@tonejs/midi"></script>

  <script>
    const $ = id => document.getElementById(id);
    const APP = {
      midi: null, synths: [], isPlaying: false, 
      isFlipMode: false, currentFlip: 1,
      midiLoaded: false, mediaLoaded: false
    };

    const EL = {
      video: $('main-video'),
      canvas: $('piano-roll'),
      ctx: $('piano-roll').getContext('2d'),
      playBtn: $('play-btn'),
      flipBtn: $('flip-btn'),
      midiZone: $('midi-zone'),
      mediaZone: $('media-zone'),
      midiInput: $('midi-input'),
      mediaInput: $('media-input'),
      statusText: $('status-text'),
      statusDot: $('status-dot')
    };

    function setStatus(msg, active = false) {
      EL.statusText.textContent = msg;
      if (active) EL.statusDot.classList.add('active');
      else EL.statusDot.classList.remove('active');
    }

    async function handleMidi(file) {
      if (!file) return;
      try {
        const arrayBuffer = await file.arrayBuffer();
        APP.midi = new Midi(arrayBuffer);
        APP.midiLoaded = true;
        $('midi-label').textContent = `MIDI: ${file.name}`;
        EL.midiZone.classList.add('loaded');
        checkReady();
      } catch (e) {
        console.error(e);
        setStatus('MIDI 파일 오류');
      }
    }

    async function handleMedia(file) {
      if (!file) return;
      const url = URL.createObjectURL(file);
      EL.video.src = url;
      APP.mediaLoaded = true;
      $('media-label').textContent = `MEDIA: ${file.name}`;
      EL.mediaZone.classList.add('loaded');
      checkReady();
    }

    function checkReady() {
      if (APP.midiLoaded && APP.mediaLoaded) {
        EL.playBtn.disabled = false;
        setStatus('재생 준비 완료');
      }
    }

    function executeTrigger(time) {
      Tone.Draw.schedule(() => {
        // 무조건 리스타트
        EL.video.currentTime = 0;
        
        // 플립 (애니메이션 제거)
        if (APP.isFlipMode) {
          APP.currentFlip = APP.currentFlip === 1 ? -1 : 1;
          EL.video.style.transform = `scaleX(${APP.currentFlip})`;
        } else {
          APP.currentFlip = 1;
          EL.video.style.transform = `scaleX(1)`;
        }

        // 상태 도트 깜빡임
        EL.statusDot.classList.add('trigger');
        setTimeout(() => {
          EL.statusDot.classList.remove('trigger');
        }, 50);

      }, time);
    }

    async function setupPlayback() {
      Tone.Transport.cancel();
      APP.synths.forEach(s => s.dispose());
      APP.synths = [];

      APP.midi.tracks.forEach(track => {
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
        APP.synths.push(synth);
        track.notes.forEach(note => {
          Tone.Transport.schedule((time) => {
            synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            executeTrigger(time);
          }, note.time);
        });
      });
    }

    EL.playBtn.addEventListener('click', async () => {
      if (APP.isPlaying) {
        Tone.Transport.stop();
        EL.video.pause();
        APP.isPlaying = false;
        EL.playBtn.textContent = '재생 버튼';
        setStatus('정지됨');
      } else {
        await Tone.start();
        await setupPlayback();
        Tone.Transport.start();
        EL.video.play();
        APP.isPlaying = true;
        EL.playBtn.textContent = '일시 정지';
        setStatus('재생 중', true);
      }
    });

    EL.flipBtn.addEventListener('click', () => {
      APP.isFlipMode = !APP.isFlipMode;
      EL.flipBtn.classList.toggle('active', APP.isFlipMode);
      if (!APP.isFlipMode) {
        APP.currentFlip = 1;
        EL.video.style.transform = 'scaleX(1)';
      }
    });

    // 파일 드롭 및 업로드 로직 전면 수정
    const registerFileHandlers = (zone, input, handler) => {
      // 클릭 시 파일 창 열기
      zone.addEventListener('click', () => input.click());

      // 드래그 시각 효과
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        zone.classList.add('dragover');
      });

      zone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        e.stopPropagation();
        zone.classList.remove('dragover');
      });

      // 드롭 처리
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        zone.classList.remove('dragover');
        if (e.dataTransfer.파일 && e.dataTransfer.파일[0]) {
          handler(e.dataTransfer.파일[0]);
        }
      });

      // 수동 선택 처리
      input.addEventListener('change', (e) => {
        if (e.target.파일 && e.target.파일[0]) {
          handler(e.target.파일[0]);
        }
      });
    };

    registerFileHandlers(EL.midiZone, EL.midiInput, handleMidi);
    registerFileHandlers(EL.mediaZone, EL.mediaInput, handleMedia);

    function resizeCanvas() {
      EL.canvas.width = EL.canvas.parentElement.clientWidth;
      EL.canvas.height = EL.canvas.parentElement.clientHeight;
    }

    function render() {
      if (APP.isPlaying && APP.midi) {
        const time = Tone.Transport.seconds;
        EL.ctx.clearRect(0, 0, EL.canvas.width, EL.canvas.height);
        
        EL.ctx.strokeStyle = 'rgba(108, 77, 246, 0.5)';
        EL.ctx.beginPath();
        EL.ctx.moveTo(EL.canvas.width / 2, 0);
        EL.ctx.lineTo(EL.canvas.width / 2, EL.canvas.height);
        EL.ctx.stroke();

        APP.midi.tracks.forEach(track => {
          track.notes.forEach(note => {
            const x = (note.time - time) * 150 + (EL.canvas.width / 2);
            const y = EL.canvas.height - (note.midi % 24) * (EL.canvas.height / 24);
            const w = note.duration * 150;
            if (x + w > 0 && x < EL.canvas.width) {
              EL.ctx.fillStyle = note.time <= time && note.time + note.duration >= time ? 'var(--accent2)' : 'var(--accent)';
              EL.ctx.fillRect(x, y, w, 4);
            }
          });
        });
      }
      requestAnimationFrame(render);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    render();
  </script>
</body>
</html>
